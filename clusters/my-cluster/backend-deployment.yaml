apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/gallad51/lnkubernetes-test/backend:latest # {"$imagepolicy": "flux-system:backend"}          imagePullPolicy: Never
          ports:
            - containerPort: 3000
