apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: SingleBinary

    singleBinary:
      replicas: 1

    write:
      replicas: 0

    read:
      replicas: 0

    backend:
      replicas: 0

    loki:
      auth_enabled: false

    # 🔥 CRUCIAL: empêche l'auto-switch scalable
    simpleScalable:
      replicas: 0
