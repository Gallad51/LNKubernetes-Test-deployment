# helmrelease-loki.yaml - Loki deployment via Flux using the loki chart
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      version: "6.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Deploy in single-binary mode for simplicity
    deploymentMode: SingleBinary

    # Single binary configuration
    singleBinary:
      replicas: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      persistence:
        enabled: true
        size: 50Gi

    # Loki configuration
    loki:
      # Authentication disabled for single-tenant setups
      auth_enabled: false

      # Common configuration shared across all components
      commonConfig:
        replication_factor: 1

      # Schema configuration for log storage
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      # Storage configuration using local filesystem
      storage:
        type: filesystem

      # Limits configuration
      limits_config:
        # Maximum number of label names per series
        max_label_names_per_series: 30
        # Retention period for logs
        retention_period: 744h
        # Ingestion rate limit per user
        ingestion_rate_mb: 10
        ingestion_burst_size_mb: 20

    # Disable components not needed in single-binary mode
    gateway:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    # Disable microservices components
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    # Chunk cache configuration
    chunksCache:
      enabled: false

    # Results cache configuration
    resultsCache:
      enabled: false

    # Monitoring and alerting for Loki itself
    monitoring:
      selfMonitoring:
        enabled: false
      lokiCanary:
        enabled: false

    # Test configuration
    test:
      enabled: false
