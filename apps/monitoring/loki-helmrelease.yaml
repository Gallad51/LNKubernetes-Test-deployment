apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: loki
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false

      schemaConfig:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage:
        type: filesystem
        filesystem:
          directory: /var/loki

      storage_config:
        filesystem:
          directory: /var/loki

    singleBinary:
      replicas: 1

    persistence:
      enabled: true
      size: 5Gi
