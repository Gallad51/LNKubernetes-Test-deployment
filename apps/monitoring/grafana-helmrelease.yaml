apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: grafana
      version: "7.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    service:
      type: ClusterIP

    adminUser: admin
    adminPassword: admin

    persistence:
      enabled: true
      size: 5Gi

    ingress:
      enabled: true
      hosts:
        - grafana.local
